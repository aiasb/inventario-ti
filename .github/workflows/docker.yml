name: Build & Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/aiasb/inventario-ti-frontend
  BACKEND_IMAGE: ghcr.io/aiasb/inventario-ti-backend
  DATABASE_IMAGE: ghcr.io/aiasb/inventario-ti-database

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Database (SQL Server + entrypoint de restore) ───────────────────────
      - name: Build and push database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: |
            ${{ env.DATABASE_IMAGE }}:latest
            ${{ env.DATABASE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=database
          cache-to: type=gha,scope=database,mode=max
